<section class="container hero">
  <div class="hero-section">
    <div class="hero-content">
      <h1 class="hero-title">
        Discover the magic of <span class="color-span">photography</span> in our
        school
      </h1>
      <p class="hero-text">
        Our photography school offers an unforgettable journey, where you can
        learn the basics of composition, master technical skills, translate your
        unique ideas.
      </p>
      <div class="hero-content-section">
        <div class="hero-student">
          <ul class="hero-student-list">
            <li>
              <img
                class="hero-student-img"
                src="../img/jpeg/hero/stud1-mob.jpg"
                alt="student-photo"
              />
            </li>
            <li>
              <img
                class="hero-student-img"
                src="../img/jpeg/hero/stud2-mob.jpg"
                alt="student-photo"
              />
            </li>
            <li>
              <img
                class="hero-student-img"
                src="../img/jpeg/hero/stud3-mob.jpg"
                alt="student-photo"
              />
            </li>
          </ul>
          <div class="hero-happy-student">
            <p class="hero-happy-student-text">Our happy students</p>
            <svg class="hero-happy-student-svg" width="18" height="9">
              <use href="../img/sprite.svg#arrow-stroke"></use>
            </svg>
          </div>
        </div>
        <div class="hero-reviews-section">
          <div class="hero-reviews-star">
            <svg class="hero-reviews-star-svg" width="20" height="20">
              <use href="../img/sprite.svg#star"></use>
            </svg>
          </div>
          <ul class="hero-reviews-content">
            <li class="hero-reviews-text">Reviews</li>
            <li class="hero-reviews-text-numbers">+1500</li>
          </ul>
        </div>
      </div>
    </div>
    <img
      class="hero-img"
      src="../img/jpeg/hero/hero-mob.png"
      alt="camera men"
    />
    
  </div>
</section>
